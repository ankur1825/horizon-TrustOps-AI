#fullnameOverride: horizon-self-service-cicd-pipeline-backend
namespaceOverride: horizon-relevance-dev
replicaCount: 1

image:
  repository: 426946630837.dkr.ecr.us-east-1.amazonaws.com/horizon/backend
  tag: "1.4.50"
  pullPolicy: Always

imagePullSecrets: []

service:
  type: ClusterIP
  port: 8000

ldap:
  server: "ldap://openldap.horizon-relevance-dev.svc.cluster.local:389"
  bindDN: "cn=admin,dc=horizonrelevance,dc=local"
  baseDN: "ou=users,dc=horizonrelevance,dc=local"
  searchFilter: "(objectClass=inetOrgPerson)"
  uidAttribute: "uid"
  displayNameAttribute: "displayName"
  mailAttribute: "mail"
  groupBaseDN: "ou=groups,dc=horizonrelevance,dc=local"
  groupSearchFilter: "(objectClass=groupOfNames)"
  groupMemberAttribute: "member"
  groupNameAttribute: "cn"
  userGroupAttribute: "memberOf"
  roleGroupMappings:
    platform-admin:
      - horizon-platform-admins
    developer:
      - horizon-developers
    qa:
      - horizon-qa
    release-manager:
      - horizon-release-managers
    viewer:
      - horizon-viewers
  managerPasswordSecret:
    name: jenkins-ldap
    key: password

serviceAccount:
  create: false
  name: ""   

ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /$2
    nginx.ingress.kubernetes.io/use-regex: "true"
  hosts:
    - host: horizonrelevance.com
      paths:
        - path: /pipeline/api(/|$)(.*)
          pathType: ImplementationSpecific
  # tls:
  #   - secretName: ohatreact-tls
  #     hosts:
  #       - ohhdevops.cernerasp.com

#envFromSecret:
#  name: horizon-self-service-cicd-pipeline-backend 

jenkins:
  user: ankur.kashyap
  token: replace-with-jenkins-api-token
  existingSecret: ""
  userKey: JENKINS_USER
  tokenKey: JENKINS_TOKEN
  runtimeRoleArn: "arn:aws:iam::426946630837:role/HorizonJenkinsRuntimeRole"
  #user: sg1917459
  #token: 113232cbe431bdfa47ef491bbb07c5b93c        

environmentPreflight:
  enforce: false
  iamMode: validation-only
  eksAccessMode: namespace-scoped

auth:
  rbacEnforcementEnabled: true
  sessionTtlSeconds: "43200"
  sessionSecret:
    existingSecret: ""
    key: BACKEND_SESSION_SECRET

enterprise:
  licenseEnforcementEnabled: false
  clientId: horizon-internal
  clientName: "Horizon Relevance Internal"
  licenseKey: internal-dev-license
  licenseType: internal
  licenseExpiresAt: "2099-12-31T23:59:59Z"
  enabledPipelines: "Build & Deploy Pipeline,Validation Pipeline,Release Promotion Pipeline"
  enabledFeatures: "build,artifact_publish,code_scan,image_scan,policy_validation,static_application_security,test_suites,notifications,secret_management,prod_deploy,ai_remediation"
  allowedEnvironments: "DEV,QA,STAGE,PROD,EKS-NONPROD,EKS-PROD"
  allowedAwsAccountIds: ""
  installationId: ""
  awsAccountId: ""
  awsRegion: us-east-1
  productVersion: "1.4.50"
  maxRepos: "999999"
  maxBuildsPerMonth: "999999"
  maxUsers: "999999"
  licenseFile: ""
  licenseMode: offline-file
  licenseSyncEndpoint: ""
  licenseUpgradeEndpoint: ""
  licenseUsageReportingEnabled: false
  licenseUsageEndpoint: ""
  licenseAutoSyncEnabled: false
  licenseAutoSyncIntervalSeconds: "21600"
  licenseCacheGraceHours: "72"
  licenseCacheFile: /app/data/enterprise-license-cache.json
  licenseSignatureVerificationRequired: true
  licensePublicKeyFile: ""
  licensePublicKeySetFile: ""
  activationTokenSecret:
    existingSecret: ""
    key: ENTERPRISE_LICENSE_ACTIVATION_TOKEN
  signingSecret:
    existingSecret: ""
    key: ENTERPRISE_LICENSE_SIGNING_SECRET
  publicKeySecret:
    existingSecret: ""
    key: ENTERPRISE_LICENSE_PUBLIC_KEY_PEM
  publicKeySetSecret:
    existingSecret: ""
    key: ENTERPRISE_LICENSE_PUBLIC_KEY_SET_JSON

environmentCatalog:
  enabled: true
  configFile: /app/config/environment-catalog.json
  syncTokenSecret:
    existingSecret: ""
    key: token
  environments:
    - name: DEV
      display_name: Development
      account_tier: nonprod
      aws_account_id: ""
      aws_region: us-east-1
      ecr_registry: ""
      ecr_repository_template: "{project_name}"
      artifact_bucket: ""
      client_aws_role_arn: ""
      nonprod_aws_role_arn: ""
      source_aws_role_arn: ""
      target_aws_role_arn: ""
      cluster_name: ""
      namespace_strategy: auto
      namespace_template: "{client_id}-{project_name}-{env}"
      iam_validation_mode: validation-only
      eks_access_mode: namespace-scoped
      sns_topic_arn: ""
      is_active: true
    - name: QA
      display_name: Quality Assurance
      account_tier: nonprod
      aws_account_id: ""
      aws_region: us-east-1
      ecr_registry: ""
      ecr_repository_template: "{project_name}"
      artifact_bucket: ""
      client_aws_role_arn: ""
      nonprod_aws_role_arn: ""
      source_aws_role_arn: ""
      target_aws_role_arn: ""
      cluster_name: ""
      namespace_strategy: auto
      namespace_template: "{client_id}-{project_name}-{env}"
      iam_validation_mode: validation-only
      eks_access_mode: namespace-scoped
      sns_topic_arn: ""
      is_active: true
    - name: STAGE
      display_name: Stage
      account_tier: nonprod
      aws_account_id: ""
      aws_region: us-east-1
      ecr_registry: ""
      ecr_repository_template: "{project_name}"
      artifact_bucket: ""
      client_aws_role_arn: ""
      nonprod_aws_role_arn: ""
      source_aws_role_arn: ""
      target_aws_role_arn: ""
      cluster_name: ""
      namespace_strategy: auto
      namespace_template: "{client_id}-{project_name}-{env}"
      iam_validation_mode: validation-only
      eks_access_mode: namespace-scoped
      sns_topic_arn: ""
      is_active: true
    - name: PROD
      display_name: Production
      account_tier: prod
      aws_account_id: ""
      aws_region: us-east-1
      ecr_registry: ""
      ecr_repository_template: "{project_name}"
      artifact_bucket: ""
      client_aws_role_arn: ""
      nonprod_aws_role_arn: ""
      source_aws_role_arn: ""
      target_aws_role_arn: ""
      cluster_name: ""
      namespace_strategy: auto
      namespace_template: "{client_id}-{project_name}-{env}"
      iam_validation_mode: validation-only
      eks_access_mode: namespace-scoped
      sns_topic_arn: ""
